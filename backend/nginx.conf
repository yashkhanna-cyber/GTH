user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # WebSocket Map Configuration
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Backend upstream
    upstream fastapi_backend {
        server localhost:8000;
        keepalive 32;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name gth.geetauniversity.edu.in;

        # Redirect all HTTP traffic to HTTPS (Placeholder - comment out for local dev)
        # return 301 https://$host$request_uri;

        client_max_body_size 20M; # Max upload size

        # Static files fallback
        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        # API V1 Endpoints proxy
        location /api/v1/ {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            
            # Standard headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Keepalive settings
            proxy_set_header Connection "";
            
            # Timeout configuration
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # WebSocket Endpoints proxy (e.g. /ws/)
        location /ws/ {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            
            # Upgrade headers for WS handshake
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Persistent socket connection settings
            proxy_read_timeout 86400s; # Keep socket open for 24h
            proxy_send_timeout 86400s;
        }
    }

    # SSL Server template (Placeholder)
    # server {
    #     listen 443 ssl http2;
    #     server_name gth.geetauniversity.edu.in;
    #
    #     ssl_certificate /etc/letsencrypt/live/gth.geetauniversity.edu.in/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/gth.geetauniversity.edu.in/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     # Proxy settings same as above ...
    # }
}
