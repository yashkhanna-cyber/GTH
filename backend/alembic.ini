# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path pathpower (space-separated paths)
prepend_sys_path = .

# timezone to use when rendering dates within the migration file
# timezone = UTC

# max length of characters to use when generating
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow scientists to write migration files
# with empty descriptions
# create_ad_hoc = false

# logging config
# [logging]
# ... (standard python logging configurations)

# version locations
version_locations = %(here)s/alembic/versions

# database URL configuration - overridden dynamically in env.py
sqlalchemy.url = postgresql+asyncpg://gth_user:gth_password@localhost:5432/gth_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(name)s] %(levelname)s: %(message)s
datefmt = %H:%M:%S
