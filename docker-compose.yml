version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gth_postgres
    restart: always
    environment:
      POSTGRES_USER: gth_user
      POSTGRES_PASSWORD: gth_password
      POSTGRES_DB: gth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gth_user -d gth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gth_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gth_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://gth_user:gth_password@postgres:5432/gth_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET=gth-techverse-2026-super-secret-key-change-in-production
      - ENVIRONMENT=development
      - STORAGE_PROVIDER=local
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gth_celery_worker
    restart: always
    command: celery -A celery_app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://gth_user:gth_password@postgres:5432/gth_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JWT_SECRET=gth-techverse-2026-super-secret-key-change-in-production
      - ENVIRONMENT=development
      - STORAGE_PROVIDER=local
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
